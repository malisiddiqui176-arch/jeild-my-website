<!DOCTYPE html>
<html>
<head>
    <title>Skill Academy Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2>🎓 Skill Academy Pro</h2>

    <div class="top-buttons">
        <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
        <button onclick="openLogin()">Login</button>
        <button onclick="downloadApp()">Download</button>
    </div>
</header>

<section class="hero">
    <h1>Learn Computer Skills Online 🚀</h1>
    <p>HTML | CSS | JavaScript | Python | Cyber Security</p>
</section>

<section class="courses">
    <h2>📚 Courses</h2>

    <div class="grid">
        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">Python</div>
        <div class="card">Java</div>
        <div class="card">C++</div>
        <div class="card">Web Design</div>
        <div class="card">Cyber Security</div>
    </div>
</section>

<section class="membership">
    <h2>💎 Membership</h2>
    <button>Join Now</button>
</section>

<footer>
    <p>© 2026 Skill Academy Pro</p>
</footer>

<!-- LOGIN BOX -->
<div id="loginBox" class="login">
    <h3>Login</h3>
    <input placeholder="Email">
    <input placeholder="Password" type="password">
    <button onclick="closeLogin()">Close</button>
</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

function openLogin() {
    document.getElementById("loginBox").style.display = "block";
}

function closeLogin() {
    document.getElementById("loginBox").style.display = "none";
}

function downloadApp() {
    alert("Download will start soon 🚀");
}
</script>

</body>
</html>
