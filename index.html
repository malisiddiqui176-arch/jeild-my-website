<!DOCTYPE html>
<html>
<head>
    <title>Nano Digital Academy App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h2>🎓 Nano Digital Academy</h2>

    <button onclick="showHome()">🏠 Home</button>
    <button onclick="showCourses()">📚 Courses</button>
    <button onclick="showLogin()">🔐 Login</button>
    <button onclick="showSettings()">⚙️ Settings</button>

</div>

<!-- MAIN -->
<div class="main">

    <!-- HOME -->
    <div id="home" class="page">
        <h1>Welcome to Nano Digital Academy 🚀</h1>
        <p>Learn skills anytime anywhere</p>
    </div>

    <!-- COURSES -->
    <div id="courses" class="page" style="display:none;">
        <h2>📚 Courses</h2>

        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">Python</div>
        <div class="card">Cyber Security</div>
        <div class="card">Web Design</div>
    </div>

    <!-- LOGIN -->
    <div id="login" class="page" style="display:none;">
        <h2>Login</h2>

        <input placeholder="Email">
        <input type="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <h3 id="msg"></h3>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="page" style="display:none;">
        <h2>⚙️ Settings</h2>

        <button onclick="toggleDark()">🌙 Dark Mode</button>
        <button onclick="showAbout()">ℹ️ About</button>
        <button onclick="showHelp()">❓ Help</button>
        <button onclick="showFees()">💰 Fees</button>
    </div>

</div>

<!-- ABOUT -->
<div id="aboutBox" class="popup">
    <p>
        Welcome to Nano Digital Academy, a platform dedicated to making learning simple, accessible, and affordable for everyone.
    </p>
</div>

<script>
function showPage(id){
    let pages = document.querySelectorAll(".page");
    pages.forEach(p => p.style.display = "none");
    document.getElementById(id).style.display = "block";
}

function showHome(){ showPage("home"); }
function showCourses(){ showPage("courses"); }
function showLogin(){ showPage("login"); }
function showSettings(){ showPage("settings"); }

function login(){
    document.getElementById("msg").innerText = "🙏 Thank you for logging in!";
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

function showAbout(){
    document.getElementById("aboutBox").classList.toggle("show");
}

function showHelp(){
    alert("Help: contact support@nanodigitalacademy.com");
}

function showFees(){
    alert("HTML $10 | CSS $10 | JS $20 | Full Course $50");
}
</script>

</body>
</html>
